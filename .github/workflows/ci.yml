name: Continuous Integration

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests and Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest flake8 mypy

      - name: Lint (syntax errors only)
        run: |
          flake8 core/ ui/ launcher.py version.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Type check
        run: mypy core/ ui/ launcher.py version.py --ignore-missing-imports || true

      - name: Run tests
        run: python -m pytest tests/ -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for sensitive files
        run: |
          if find . -name ".env" -o -name ".env.local" | grep -q .; then
            echo "ERROR: .env files found in repository!"
            find . -name ".env" -o -name ".env.local"
            exit 1
          fi
          if find . -name "*.pem" -o -name "*.key" | grep -v ".github" | grep -q .; then
            echo "ERROR: Private key files found!"
            exit 1
          fi
          echo "Security scan passed"

  structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          for f in launcher.py version.py requirements.txt core/downloader.py ui/gui.py; do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done
          echo "Project structure OK"