name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Tests and Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flake8 pylint
        
    - name: Lint with flake8
      run: |
        # Stop build if there are Python syntax errors or undefined names
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Run tests
      run: |
        python -m pytest tests/ -v
        
    - name: Test application entry point
      run: |
        python main.py --help || echo "Application started successfully"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Security scan for sensitive files
      run: |
        echo "🔍 Scanning for sensitive files..."
        
        # Check for files that should be ignored
        if find . -name "cursorrules" -o -name ".cursorrules" | grep -q .; then
          echo "❌ CRITICAL: cursorrules found in repository!"
          find . -name "cursorrules" -o -name ".cursorrules"
          exit 1
        fi
        
        # Check for environment files
        if find . -name ".env" -o -name "*.local" | grep -q .; then
          echo "❌ CRITICAL: Environment files found in repository!"
          find . -name ".env" -o -name "*.local"
          exit 1
        fi
        
        # Check for potential secrets (excluding allowed patterns)
        if git ls-files | xargs grep -l "password\|secret\|api_key\|token" | grep -v -E "(\.md|\.yml|\.py)$" | grep -q .; then
          echo "❌ WARNING: Potential secrets found!"
          git ls-files | xargs grep -l "password\|secret\|api_key\|token" | grep -v -E "(\.md|\.yml|\.py)$"
          exit 1
        fi
        
        echo "✅ Security scan passed"

  structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Validate single-repo structure
      run: |
        echo "🏗️ Validating repository structure..."
        
        # Check required directories exist
        for dir in src tests docs; do
          if [ ! -d "$dir" ]; then
            echo "❌ Required directory missing: $dir"
            exit 1
          fi
        done
        
        # Check main application files exist in src/
        for file in main.py gui.py downloader.py utils.py; do
          if [ ! -f "src/$file" ]; then
            echo "❌ Required file missing: src/$file"
            exit 1
          fi
        done
        
        # Check that public-src/ doesn't exist (migration check)
        if [ -d "public-src" ]; then
          echo "❌ MIGRATION ERROR: public-src/ still exists!"
          echo "This indicates incomplete migration from dual-repo"
          exit 1
        fi
        
        # Check that dual-repo files don't exist
        if [ -f "docs/DUAL-REPO.md" ] || [ -f "docs/ZASADY-DUAL-REPO.md" ]; then
          echo "❌ MIGRATION ERROR: Dual-repo documentation still exists!"
          exit 1
        fi
        
        echo "✅ Repository structure validation passed"
        echo "✅ Single-repo migration successful"