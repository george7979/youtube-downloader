name: Build and Release

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: linux-deb
            artifact-path: "*.deb"
          - os: windows-latest
            artifact-name: windows-installer
            artifact-path: "installer/windows/youtube-downloader-*-setup.exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yt-dlp customtkinter "pyinstaller>=6.0" pillow

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 -c "from version import __version__; print(__version__)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binary (PyInstaller)
        run: pyinstaller youtube-downloader.spec --clean

      - name: Build .deb package (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y fakeroot dpkg-dev
          bash installer/linux/build-deb.sh ${{ steps.version.outputs.VERSION }}

      - name: Verify .deb (Linux)
        if: runner.os == 'Linux'
        run: dpkg --info *.deb

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis --yes

      - name: Build NSIS installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $makensis /DAPP_VERSION=$env:APP_VERSION installer\windows\installer.nsi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  test-install-linux:
    name: Test .deb on Ubuntu ${{ matrix.ubuntu }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ubuntu: ['20.04', '22.04', '24.04']
    container:
      image: ubuntu:${{ matrix.ubuntu }}
    steps:
      - name: Install tools
        run: apt-get update && apt-get install -y wget

      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: linux-deb

      - name: Install and verify
        run: |
          dpkg -i *.deb || true
          apt-get install -f -y
          dpkg -l | grep youtube-downloader
          test -f /usr/bin/youtube-downloader
          echo "Install OK on Ubuntu ${{ matrix.ubuntu }}"

  release:
    name: Create GitHub Release
    needs: [build, test-install-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts flat
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: YouTube Downloader v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: release-assets/**
          body: |
            ## YouTube Downloader v${{ steps.version.outputs.VERSION }}

            ### Linux (Debian/Ubuntu)
            Pobierz `.deb` i zainstaluj: `sudo dpkg -i youtube-downloader_VERSION_amd64.deb`

            ### Windows
            Pobierz `youtube-downloader-VERSION-setup.exe` i uruchom instalator.

            Przetestowano: Ubuntu 20.04 / 22.04 / 24.04 LTS, Windows 10/11

            ---
            Uzytkownik odpowiada za legalnosc pobieranych tresci.
